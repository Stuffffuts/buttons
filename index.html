<!DOCTYPE html>
<html>
<body>
  <h1>💰 Money Game</h1>
  <p>Money: <span id="m">0</span></p>
  <p>Multi: <span id="x">1</span></p>
  <button id="clk">Click me!</button>
  <button id="buy">Buy x2 (cost10)</button>

  <script>
    // m = money, x = multiplier, c = cost
    let m=0,x=1,c=10;
    // u() updates displayed values
    const u=()=>{ 
      document.getElementById("m").innerText=m;
      document.getElementById("x").innerText=x;
    };

    // add money on click
    document.getElementById("clk").onclick=_=>{
      m+=x; u();
    };

    // buy multiplier if enough money
    document.getElementById("buy").onclick=_=>{
      if(m<c) return alert("Not enough money!");
      m-=c; x++; u();
    };
  </script>
</body>
</html>
