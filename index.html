<!DOCTYPE html>
<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Build Your Own World</title><style>body{font-family:Arial,sans-serif;background:#fff;color:#111;text-align:center;margin:0;padding:20px}.card{max-width:520px;margin:20px auto;padding:20px;border:1px solid #ddd;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08)}input,button{padding:10px;margin:6px;border-radius:10px;border:1px solid #ccc}button{cursor:pointer;background:#111;color:#fff}.hidden{display:none}</style></head><body>
<div id='loginPage' class='card'><h1>🌍 Login</h1><input id='nameInput' placeholder='Username'><br><input id='passInput' type='password' placeholder='Password'><br><button onclick='createAccount()'>Create Account</button><button onclick='login()'>Login</button><p id='msg'></p></div>
<div id='gamePage' class='hidden'>
<div class='card'><h1>🌍 Build Your Own World</h1><p>User ID: <span id='uid'></span></p><p>Cosmic Process: <span id='c'>0</span></p><p>Atoms: <span id='a'>0</span></p><p>Molecules: <span id='m'>0</span></p><p>Macromolecules: <span id='M'>0</span></p><button onclick='g()'>Generate</button><br><button onclick='ba(1)'>Buy 1 Atom</button><button onclick='ba(2)'>Buy 2 Atom</button><button onclick='ba(5)'>Buy 5 Atom</button><button onclick='ba(10)'>Buy 10 Atom</button><br><button onclick='bm()'>Buy Molecule (25 Atoms)</button><button onclick='bM()'>Buy Macromolecule (100 Molecules)</button><br><button onclick='resetGame()'>Reset Progress</button></div>
<div class='card'><button onclick='toggleBoard("daily")'>Daily Leaderboard</button><button onclick='toggleBoard("all")'>All Time Leaderboard</button><div id='daily' class='hidden'></div><div id='all' class='hidden'></div></div></div>
<script>let c=0,a=0,m=0,M=0,currentUser=null;function makeID(){return 'USER'+Math.floor(Math.random()*900000+100000)}function users(){return JSON.parse(localStorage.getItem('users')||'{}')}function saveUsers(u){localStorage.setItem('users',JSON.stringify(u))}function createAccount(){let n=nameInput.value.trim(),p=passInput.value.trim(),u=users();if(!n||!p){msg.innerText='Enter username + password';return;}if(u[n]){msg.innerText='Username taken, choose another name';return;}u[n]={password:p,id:makeID(),c:0,a:0,m:0,M:0};saveUsers(u);msg.innerText='Account created!'}function login(){let n=nameInput.value.trim(),p=passInput.value.trim(),u=users();if(u[n]&&u[n].password===p){currentUser=n;c=u[n].c;a=u[n].a;m=u[n].m;M=u[n].M;uid.innerText=u[n].id;loginPage.classList.add('hidden');gamePage.classList.remove('hidden');render();updateBoards()}else msg.innerText='Wrong login'}function atomBuyAmount(){return 1+m}function moleculeBuyAmount(){return 1+M}function save(){if(!currentUser)return;let u=users();u[currentUser].c=c;u[currentUser].a=a;u[currentUser].m=m;u[currentUser].M=M;saveUsers(u)}function g(){c+=Math.max(1,a*2);render()}function ba(t){let cost=10*t;if(c>=cost){c-=cost;a+=atomBuyAmount()*t;render()}}function bm(){if(a>=25){a-=25;m+=moleculeBuyAmount();render()}}function bM(){if(m>=100){m-=100;M++;render()}}function resetGame(){if(confirm('Reset progress?')){c=0;a=0;m=0;M=0;render()}}function render(){c=Math.floor(c);document.getElementById('c').innerText=c;document.getElementById('a').innerText=a;document.getElementById('m').innerText=m;document.getElementById('M').innerText=M;save()}function boardHTML(){let arr=[],u=users();for(let n in u){arr.push({name:n,score:u[n].c})}arr.sort((x,y)=>y.score-x.score);return arr.slice(0,10).map((x,i)=>(i+1)+'. '+x.name+' - '+Math.floor(x.score)).join('<br>')}function updateBoards(){daily.innerHTML=boardHTML();all.innerHTML=boardHTML()}function toggleBoard(id){document.getElementById(id).classList.toggle('hidden');updateBoards()}setInterval(updateBoards,60000);</script></body></html>
