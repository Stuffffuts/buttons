<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Build Your Own World</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
  font-family:Arial;
  background:#fff;
  color:#111;
  text-align:center;
  margin:0;
  padding:20px;
}
.card{
  max-width:520px;
  margin:20px auto;
  padding:20px;
  border:1px solid #ddd;
  border-radius:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
input,button{
  padding:10px;
  margin:6px;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  cursor:pointer;
  background:#111;
  color:#fff;
}
.hidden{display:none;}
</style>
</head>

<body>

<div id="loginPage" class="card">
  <h1>Login</h1>

  <input id="nameInput" placeholder="Username"><br>
  <input id="passInput" type="password" placeholder="Password"><br>

  <button onclick="createAccount()">Create Account</button>
  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<div id="gamePage" class="hidden">

  <div class="card">
    <h1>Build Your Own World</h1>

    <p>User ID: <span id="uid"></span></p>

    <p>Cosmic Process: <span id="c">0</span></p>
    <p>Atoms: <span id="a">0</span></p>
    <p>Molecules: <span id="m">0</span></p>
    <p>Macromolecules: <span id="M">0</span></p>
    <p>Cells: <span id="cell">0</span></p>

    <button onclick="g()">Generate</button>

    <hr>

    <h3>Atoms (10 Cosmic each)</h3>
    <button onclick="ba(1)">Buy 1 Atom</button>
    <button onclick="ba(2)">Buy 2 Atoms</button>
    <button onclick="ba(5)">Buy 5 Atoms</button>
    <button onclick="ba(10)">Buy 10 Atoms</button>

    <hr>

    <h3>Molecules (25 Atoms each)</h3>
    <button onclick="bm(1)">Buy 1 Molecule</button>
    <button onclick="bm(2)">Buy 2 Molecules</button>
    <button onclick="bm(5)">Buy 5 Molecules</button>
    <button onclick="bm(10)">Buy 10 Molecules</button>

    <hr>

    <h3>Macromolecules (100 Molecules each)</h3>
    <button onclick="bM(1)">Buy 1 Macro</button>
    <button onclick="bM(2)">Buy 2 Macro</button>
    <button onclick="bM(5)">Buy 5 Macro</button>
    <button onclick="bM(10)">Buy 10 Macro</button>

    <hr>

    <h3>Cells (2500 Macromolecules each)</h3>
    <button onclick="bcell(1)">Buy 1 Cell</button>
    <button onclick="bcell(2)">Buy 2 Cells</button>
    <button onclick="bcell(5)">Buy 5 Cells</button>
    <button onclick="bcell(10)">Buy 10 Cells</button>

    <hr>

    <button onclick="resetGame()">Reset Progress</button>
  </div>

  <div class="card">
    <button onclick="toggleBoard('all')">All Time Leaderboard</button>
    <div id="all" class="hidden"></div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey:'AIzaSyBd-JHJ5DoIru1GrznHA1Q2GIOylVux-i0',
  authDomain:'online-b0e4f.firebaseapp.com',
  databaseURL:'https://online-b0e4f-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:'online-b0e4f',
  storageBucket:'online-b0e4f.firebasestorage.app',
  messagingSenderId:'780979748832',
  appId:'1:780979748832:web:5bf9390c15c2ecb35c3585'
};

try{firebase.initializeApp(firebaseConfig);}catch(e){}

const db = (typeof firebase!=='undefined' && firebase.apps.length)
  ? firebase.database()
  : null;

let c=0,a=0,m=0,M=0,cell=0,currentUser=null;

function makeID(){
  return "USER"+Math.floor(Math.random()*900000+100000);
}

function users(){
  return JSON.parse(localStorage.getItem("users")||"{}");
}

function saveUsers(u){
  localStorage.setItem("users",JSON.stringify(u));
}

async function createAccount(){
  let n=nameInput.value.trim();
  let p=passInput.value.trim();
  let u=users();

  if(!n || !p){
    msg.innerText="Enter username + password";
    return;
  }

  if(u[n]){
    msg.innerText="Username taken";
    return;
  }

  u[n]={
    password:p,
    id:makeID(),
    c:0,a:0,m:0,M:0,cell:0
  };

  saveUsers(u);

  if(db) await db.ref("users/"+n).set(u[n]);

  msg.innerText="Account created!";
}

async function login(){
  let n=nameInput.value.trim();
  let p=passInput.value.trim();
  let u=users();
  let cloud=null;

  if(db){
    let s=await db.ref("users/"+n).get();
    if(s.exists()) cloud=s.val();
  }

  let data = cloud || u[n];

  if(data && data.password===p){
    currentUser=n;

    c=+data.c||0;
    a=+data.a||0;
    m=+data.m||0;
    M=+data.M||0;
    cell=+data.cell||0;

    uid.innerText=data.id;

    loginPage.classList.add("hidden");
    gamePage.classList.remove("hidden");

    render();
    updateBoards();
  }else{
    msg.innerText="Wrong login";
  }
}

/* MULTIPLIERS */
function atomPower(){
  return Math.pow(2,m) * Math.pow(3,cell);
}

function moleculePower(){
  return Math.pow(2,M);
}

function macroPower(){
  return Math.pow(2.5,cell);
}

function cosmicPower(){
  return Math.pow(3,M) * Math.pow(5,cell);
}

/* GENERATE */
function g(){
  let gain = Math.max(1, a * atomPower()) * cosmicPower();
  c += gain;
  render();
}

/* BUY FUNCTIONS */
function ba(t){
  let cost = 10*t;
  if(c>=cost){
    c-=cost;
    a+=t;
    render();
  }
}

function bm(t){
  let cost = 25*t;
  if(a>=cost){
    a-=cost;
    m += t * moleculePower();
    render();
  }
}

function bM(t){
  let cost = 100*t;
  if(m>=cost){
    m-=cost;
    M += t * macroPower();
    render();
  }
}

function bcell(t){
  let cost = 2500*t;
  if(M>=cost){
    M-=cost;
    cell += t;
    render();
  }
}

/* RESET */
function resetGame(){
  if(confirm("Reset progress?")){
    c=0;a=0;m=0;M=0;cell=0;
    render();
  }
}

/* SAVE + DISPLAY */
function save(){
  if(!currentUser)return;

  let u=users();

  if(!u[currentUser]){
    u[currentUser]={password:'',id:uid.innerText};
  }

  u[currentUser]={
    ...u[currentUser],
    password:u[currentUser].password,
    id:uid.innerText,
    c,a,m,M,cell
  };

  saveUsers(u);

  if(db){
    db.ref("users/"+currentUser).update(u[currentUser]);
  }
}

function render(){
  c=+c||0;a=+a||0;m=+m||0;M=+M||0;cell=+cell||0;

  document.getElementById("c").innerText=Math.floor(c);
  document.getElementById("a").innerText=Math.floor(a);
  document.getElementById("m").innerText=Math.floor(m);
  document.getElementById("M").innerText=Math.floor(M);
  document.getElementById("cell").innerText=Math.floor(cell);

  save();
}

/* LEADERBOARD */
async function boardHTML(){
  let arr=[];
  let u=users();

  for(let n in u){
    arr.push({name:n,score:+u[n].c||0});
  }

  if(db){
    let s=await db.ref("users").get();
    if(s.exists()){
      arr=[];
      let all=s.val();

      for(let n in all){
        arr.push({name:n,score:+all[n].c||0});
      }
    }
  }

  arr.sort((x,y)=>y.score-x.score);

  return arr.slice(0,10)
    .map((x,i)=>(i+1)+". "+x.name+" - "+Math.floor(x.score))
    .join("<br>");
}

async function updateBoards(){
  all.innerHTML = await boardHTML();
}

function toggleBoard(id){
  document.getElementById(id).classList.toggle("hidden");
  updateBoards();
}

setInterval(updateBoards,60000);
</script>

</body>
</html>
