<!DOCTYPE html>
<html>
  <body>

    <h1>Buttons</h1>

    <p>Money: <span id="money">0</span></p>
    <p>Multiplier: <span id="multi">1</span></p>

    <button onclick="addMoney()">Click me!</button>
    <br><br>
    <button onclick="buyMulti()">Buy x2 (cost: 10)</button>

    <script>
      let money = 0;
      let multi = 1;
      let cost = 10;

      function addMoney() {
        money = money + multi;
        document.getElementById("money").innerText = money;
      }

      function buyMulti() {
        if (money >= cost) {
          money = money - cost;
          multi = multi + 1;

          document.getElementById("money").innerText = money;
          document.getElementById("multi").innerText = multi;
        } else {
          alert("Not enough money!");
        }
      }
    </script>

  </body>
</html>
